name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            portaudio19-dev \
            python3-dev \
            libgl1 \
            libglib2.0-0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match HEAD | sed 's/^v//')
          else
            DATE=$(date -u +%Y%m%d)
            SHA=$(git rev-parse --short HEAD)
            VERSION="0.0.0+${DATE}.${SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --clean --onefile \
            --name jitterbugs \
            --collect-all mediapipe \
            --collect-all cv2 \
            scripts/run_sniffer.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean --onefile `
            --name jitterbugs `
            --collect-all mediapipe `
            --collect-all cv2 `
            scripts/run_sniffer.py

      - name: Upload Linux binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: jitterbugs-linux-${{ steps.version.outputs.version }}
          path: dist/jitterbugs

      - name: Build Debian package
        if: runner.os == 'Linux'
        run: bash packaging/deb/build-deb.sh "${{ steps.version.outputs.version }}"

      - name: Upload .deb package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: jitterbugs-deb-${{ steps.version.outputs.version }}
          path: packaging/deb/jitterbugs_*.deb

      - name: Upload Windows executable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: jitterbugs-windows-${{ steps.version.outputs.version }}
          path: dist/jitterbugs.exe
